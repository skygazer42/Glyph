version: '3.8'

services:
  mineru:
    image: openmmlab/mineru:2.5-latest
    container_name: mineru-server
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - API_KEY=mineru
      - MODEL=Qwen/Qwen2.5-7B-Instruct
    command: >
      sh -c "uvicorn mineru.api:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped
    # GPU支持（如果有）
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - gove-network

  # 可选：Qdrant向量数据库
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: qdrant-db
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - gove-network

  # 可选：Chroma向量数据库
  chroma:
    image: chromadb/chroma:latest
    container_name: chroma-db
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
    restart: unless-stopped
    networks:
      - gove-network

volumes:
  qdrant_storage:
  chroma_data:

networks:
  gove-network:
    driver: bridge