rule_id: Rule_济南_家电补贴_2025
name: 济南市2025年家电消费补贴实施方案
version: 1.0

policy_source:
  doc_id: 济商务字〔2025〕88号
  title: "济南市2025年家电消费补贴实施方案"
  

# ===== 有效期 =====
valid_period:
  start: "2025-01-01"
  end: "2025-12-31"

# ===== 输入参数 =====
inputs:
  - name: price
    type: float
    required: true
    description: "商品销售价格(>=0)"
  - name: energy_level
    type: integer   # 允许 1/2 或 null；null 代表无标识
    required: false
    description: "能效等级(1级/2级/无→null)"
  - name: category
    type: string
    required: true
    description: "家电类别"

# ===== 能效补贴率 =====
efficiency_rates:
  base_rate: 0.15        # 2级及以上基础补贴
  level_1_bonus: 0.05 # 1级额外补贴
  no_label_rate: 0.1 # 无标识产品，默认更低

# ===== 类别限额（数量或金额，需按政策决定生效点）=====
category_limits:
  per_category:

    空调: 3

    冰箱: 2

    其他: 1

  total_items: None

# ===== 单品补贴上限 =====
per_item_cap: 2000

# ===== 计算逻辑 =====
calc:
  result: "dsl_helpers.appliance_subsidy(inputs, efficiency_rates, per_item_cap, category_limits, rule.get('special_rules', {}), user_state)"

# ===== 特殊规则 =====


# ===== 输出配置 =====
output:
  status: "{{ calc.result.status }}"
  final_result: "{{ calc.result.final_subsidy }}"
  trace_template: |
    - 商品价格：¥{{ calc.result.price }}
    - 能效等级：{{ ('无' if calc.result.energy_level in (None, 0) else (str(calc.result.energy_level) + '级')) }}
    - 补贴比例：{{ (calc.result.rate * 100) }}%
    - 原始补贴：¥{{ calc.result.raw_subsidy }}
    - 封顶后补贴：¥{{ calc.result.final_subsidy }}