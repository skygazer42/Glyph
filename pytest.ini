[pytest]
# pytest 配置文件
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 定义标记
markers =
    requires_network: 测试需要网络连接（例如访问 API 服务）
    unit: 单元测试（不需要外部依赖）
    integration: 集成测试（可能需要外部服务）
    slow: 执行较慢的测试

# 默认选项
addopts =
    -v
    --tb=short
    --strict-markers
    -m "not requires_network"

# 忽略某些警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning